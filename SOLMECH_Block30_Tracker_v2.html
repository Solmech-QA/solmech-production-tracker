<title>SOLMECH · Block 30</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #E30613; --black: #1A1A1A; --graphite: #303030;
  --grey-dark: #4D4D4D; --grey-mid: #808080; --grey-light: #D9D9D9;
  --grey-soft: #F2F2F2; --white: #FFFFFF;
  --green-bg: #EAF3DE; --green-text: #3B6D11; --green-border: #97C459;
  --amber-bg: #FAEEDA; --amber-text: #854F0B;
  --blue-bg: #E6F1FB; --blue-text: #185FA5;
  --radius: 10px; --radius-lg: 14px;
}
html, body { height: 100%; background: var(--grey-soft); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; color: var(--graphite); -webkit-tap-highlight-color: transparent; }
#app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--grey-soft); display: flex; flex-direction: column; }

/* HEADER */
.header { background: var(--black); color: #fff; padding: 14px 16px 12px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
.header-back { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; padding: 0 8px 0 0; line-height: 1; display: none; }
.header-back.visible { display: block; }
.header-info h1 { font-size: 15px; font-weight: 600; color: #fff; line-height: 1.2; }
.header-info .sub { font-size: 11px; color: #aaa; margin-top: 2px; }
.red-bar { height: 3px; background: var(--red); flex-shrink: 0; }

/* IDENTITY BANNER */
.id-banner { background: var(--black); color: #fff; padding: 10px 16px; font-size: 12px; display: flex; align-items: center; gap: 8px; }
.id-banner i { color: var(--red); font-size: 14px; }
.id-banner .id-main { font-weight: 600; font-size: 13px; }
.id-banner .id-sub { color: #aaa; font-size: 11px; margin-top: 1px; }
.id-banner .change-btn { margin-left: auto; font-size: 11px; color: #aaa; cursor: pointer; white-space: nowrap; }

.screen { flex: 1; padding: 16px; overflow-y: auto; }

/* ONBOARDING */
.logo-area { text-align: center; padding: 28px 0 20px; }
.logo-text { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; color: var(--black); }
.logo-text span { color: var(--red); }
.logo-sub { font-size: 13px; color: var(--grey-mid); margin-top: 4px; }
.section-label { font-size: 11px; font-weight: 600; color: var(--grey-mid); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }

/* DISCIPLINE CARDS */
.disc-grid { display: flex; flex-direction: column; gap: 8px; }
.disc-card { background: var(--white); border-radius: var(--radius-lg); border: 1.5px solid var(--grey-light); padding: 16px; cursor: pointer; display: flex; align-items: center; gap: 14px; transition: border-color 0.15s; }
.disc-card:active { background: var(--grey-soft); }
.disc-card.selected { border-color: var(--black); background: var(--white); }
.disc-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.disc-label { font-size: 16px; font-weight: 600; color: var(--black); }
.disc-desc { font-size: 12px; color: var(--grey-mid); margin-top: 2px; }
.disc-check { margin-left: auto; font-size: 20px; color: var(--black); display: none; }
.disc-card.selected .disc-check { display: block; }

/* NAME / EQUIPMENT FORM */
.form-card { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--grey-light); padding: 16px; margin-bottom: 12px; }
.form-field { margin-bottom: 16px; }
.form-field:last-child { margin-bottom: 0; }
.form-label { font-size: 12px; font-weight: 600; color: var(--grey-dark); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; display: block; }
.form-input { width: 100%; padding: 12px 14px; border-radius: var(--radius); border: 1px solid var(--grey-light); font-size: 15px; font-family: inherit; color: var(--black); background: var(--white); -webkit-appearance: none; }
.form-input:focus { outline: none; border-color: var(--black); }

/* BUTTONS */
.btn { width: 100%; padding: 14px; border-radius: var(--radius); border: 1px solid var(--grey-light); background: var(--white); color: var(--black); font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; margin-top: 8px; }
.btn.btn-primary { background: var(--black); color: #fff; border-color: var(--black); }
.btn.btn-primary:active { background: var(--graphite); }
.btn.btn-sm { padding: 11px; font-size: 14px; font-weight: 500; flex: 1; margin-top: 0; }

/* LIST */
.list { display: flex; flex-direction: column; gap: 8px; }
.list-item { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--grey-light); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.list-item:active { background: var(--grey-soft); }
.li-label { font-size: 15px; font-weight: 600; color: var(--black); }
.li-meta { font-size: 12px; color: var(--grey-mid); margin-top: 3px; }
.li-right { display: flex; align-items: center; gap: 10px; }
.chevron { color: var(--grey-light); font-size: 18px; }

/* PILLS */
.pill { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
.pill-done { background: var(--green-bg); color: var(--green-text); }
.pill-part { background: var(--amber-bg); color: var(--amber-text); }
.pill-none { background: var(--grey-soft); color: var(--grey-mid); border: 1px solid var(--grey-light); }

/* SUMMARY BAR */
.summary-bar { background: var(--white); border-radius: var(--radius); border: 1px solid var(--grey-light); padding: 12px 14px; margin-bottom: 14px; display: flex; }
.stat { flex: 1; text-align: center; }
.stat + .stat { border-left: 1px solid var(--grey-light); }
.stat-val { font-size: 20px; font-weight: 700; color: var(--black); }
.stat-val.green { color: var(--green-text); }
.stat-val.amber { color: var(--amber-text); }
.stat-lbl { font-size: 10px; color: var(--grey-mid); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

/* PILE GRID */
.actions-row { display: flex; gap: 8px; margin-bottom: 14px; }
.pile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
.pile-btn { background: var(--white); border: 1px solid var(--grey-light); border-radius: var(--radius); padding: 12px 6px; text-align: center; cursor: pointer; }
.pile-btn:active { transform: scale(0.97); }
.pile-btn .p-id { font-size: 14px; font-weight: 700; color: var(--black); }
.pile-btn .p-phase { font-size: 10px; color: var(--grey-mid); margin-top: 3px; min-height: 14px; }
.pile-btn.state-complete { background: var(--green-bg); border-color: var(--green-border); }
.pile-btn.state-complete .p-id { color: var(--green-text); }
.pile-btn.state-complete .p-phase { color: #639922; }
.pile-btn.state-qa { background: var(--blue-bg); border-color: #85B7EB; }
.pile-btn.state-qa .p-id { color: var(--blue-text); }
.pile-btn.state-piling { background: #FAECE7; border-color: #F0997B; }
.pile-btn.state-piling .p-id { color: #993C1D; }
.pile-btn.state-pin,.pile-btn.state-drill,.pile-btn.state-sand { background: #FBEAF0; border-color: #ED93B1; }
.pile-btn.state-pin .p-id,.pile-btn.state-drill .p-id,.pile-btn.state-sand .p-id { color: #993556; }
.pile-btn.selected { outline: 3px solid var(--red); outline-offset: 1px; }

/* PHASE PANEL */
.phase-panel { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--grey-light); padding: 14px; margin-bottom: 14px; }
.phase-panel-title { font-size: 13px; color: var(--grey-mid); margin-bottom: 12px; }
.phase-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.phase-opt { padding: 11px 10px; border-radius: var(--radius); border: 1px solid var(--grey-light); background: var(--grey-soft); cursor: pointer; text-align: center; font-size: 13px; font-weight: 500; color: var(--grey-dark); display: flex; align-items: center; justify-content: center; gap: 7px; }
.phase-opt.sel { border: 2px solid var(--black); background: var(--white); color: var(--black); }
.phase-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.ts-label { font-size: 11px; color: var(--grey-mid); text-align: center; padding-top: 8px; }

.step-indicator { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 20px; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--grey-light); }
.step-dot.active { background: var(--black); }
.step-dot.done { background: var(--red); }
</style>
</head>

const data = {};
ALL_PILES.forEach(id => {
  const parts = id.trim().split('-');
  const sk = 'S' + parts[1], tk = 'T' + parts[2], pile = parts[3];
  if (!data[sk]) data[sk] = {};
  if (!data[sk][tk]) data[sk][tk] = {};
  data[sk][tk][pile] = { phase: null, name: null, equipment: null, discipline: null, ts: null };
});

let state = { view: 'discipline', discipline: null, name: '', equipment: '', section: null, tracker: null, selectedPile: null };

function save() {
  try { localStorage.setItem('sm_b30_v3', JSON.stringify({ data, discipline: state.discipline, name: state.name, equipment: state.equipment })); } catch(e) {}
}
function loadSaved() {
  try {
    const s = localStorage.getItem('sm_b30_v3');
    if (!s) return;
    const p = JSON.parse(s);
    if (p.data) Object.keys(p.data).forEach(sk => {
      if (!data[sk]) return;
      Object.keys(p.data[sk]).forEach(tk => {
        if (!data[sk][tk]) return;
        Object.keys(p.data[sk][tk]).forEach(pile => {
          if (data[sk][tk][pile] !== undefined) data[sk][tk][pile] = p.data[sk][tk][pile];
        });
      });
    });
    if (p.discipline && p.name) {
      state.discipline = p.discipline;
      state.name = p.name;
      state.equipment = p.equipment || '';
      state.view = 'home';
    }
  } catch(e) {}
}
loadSaved();

function getTrackerStats(sk, tk) {
  const piles = data[sk][tk], keys = Object.keys(piles);
  const total = keys.length;
  const done = keys.filter(p => piles[p].phase === 'complete').length;
  const started = keys.filter(p => piles[p].phase && piles[p].phase !== 'complete').length;
  return { total, done, started };
}
function getSectionStats(sk) {
  let total = 0, done = 0;
  Object.keys(data[sk]).forEach(tk => { const s = getTrackerStats(sk, tk); total += s.total; done += s.done; });
  return { total, done };
}
function pillClass(done, total, started) {
  if (done === total && total > 0) return 'pill-done';
  if (done > 0 || started > 0) return 'pill-part';
  return 'pill-none';
}

function updateHeader() {
  const backBtn = document.getElementById('back-btn');
  const title = document.getElementById('header-title');
  const sub = document.getElementById('header-sub');
  const banner = document.getElementById('id-banner');
  const idMain = document.getElementById('id-main');
  const idSub = document.getElementById('id-sub');

  const showBanner = !['discipline','identity'].includes(state.view);
  banner.style.display = showBanner ? 'flex' : 'none';
  if (showBanner && state.name) {
    idMain.textContent = state.name + ' · ' + (state.discipline || '');
    idSub.textContent = state.equipment || 'No equipment entered';
  }

  if (state.view === 'discipline') {
    backBtn.classList.remove('visible');
    title.textContent = 'Block 30';
    sub.textContent = 'Maryvale Solar Farm · SOLMECH';
  } else if (state.view === 'identity') {
    backBtn.classList.add('visible');
    title.textContent = 'Your details';
    sub.textContent = state.discipline || '';
  } else if (state.view === 'home') {
    backBtn.classList.remove('visible');
    title.textContent = 'Block 30';
    sub.textContent = 'Maryvale Solar Farm · SOLMECH';
  } else if (state.view === 'section') {
    backBtn.classList.add('visible');
    title.textContent = 'Section ' + state.section.replace('S','');
    sub.textContent = 'Block 30 · Maryvale';
  } else if (state.view === 'tracker') {
    backBtn.classList.add('visible');
    title.textContent = 'Tracker ' + state.tracker.replace('T','');
    sub.textContent = 'Sec. ' + state.section.replace('S','') + ' · Block 30';
  }
}

function render() {
  updateHeader();
  const screen = document.getElementById('screen');

  if (state.view === 'discipline') {
    screen.innerHTML = `
      <div class="logo-area">
        <div class="logo-text">SOLMEC<span>H</span></div>
        <div class="logo-sub">Production Tracker · Block 30 · Maryvale</div>
      </div>
      <p class="section-label" style="margin-bottom:10px">Select your discipline</p>
      <div class="disc-grid">
        ${DISCIPLINES.map(d => `
          <div class="disc-card ${state.discipline === d.id ? 'selected' : ''}" onclick="selectDiscipline('${d.id}')">
            <div class="disc-icon" style="background:${d.color}">
              <i class="ti ${d.icon}" style="color:${d.iconColor}"></i>
            </div>
            <div>
              <div class="disc-label">${d.label}</div>
              <div class="disc-desc">${d.desc}</div>
            </div>
            <i class="ti ti-check disc-check"></i>
          </div>`).join('')}
      </div>`;
  }

  else if (state.view === 'identity') {
    screen.innerHTML = `
      <div class="form-card">
        <div class="form-field">
          <label class="form-label">Your name</label>
          <input class="form-input" id="inp-name" type="text" placeholder="e.g. John Smith" value="${state.name}" autocomplete="name">
        </div>
        <div class="form-field">
          <label class="form-label">Plant / Equipment</label>
          <input class="form-input" id="inp-equip" type="text" placeholder="e.g. Rig 02, Excavator 3" value="${state.equipment}" autocomplete="off">
        </div>
      </div>
      <button class="btn btn-primary" onclick="confirmIdentity()">
        <i class="ti ti-arrow-right"></i> Start
      </button>`;
    setTimeout(() => { const el = document.getElementById('inp-name'); if (el && !state.name) el.focus(); }, 100);
  }

  else if (state.view === 'home') {
    const sections = Object.keys(data).sort();
    let totalAll = 0, doneAll = 0;
    sections.forEach(sk => { const s = getSectionStats(sk); totalAll += s.total; doneAll += s.done; });
    const pctAll = totalAll ? Math.round(doneAll / totalAll * 100) : 0;
    screen.innerHTML = `
      <div class="summary-bar">
        <div class="stat"><div class="stat-val">${totalAll}</div><div class="stat-lbl">Total piles</div></div>
        <div class="stat"><div class="stat-val green">${doneAll}</div><div class="stat-lbl">Complete</div></div>
        <div class="stat"><div class="stat-val ${pctAll===100?'green':pctAll>0?'amber':''}">${pctAll}%</div><div class="stat-lbl">Progress</div></div>
      </div>
      <p class="section-label">Sections</p>
      <div class="list">
        ${sections.map(sk => {
          const s = getSectionStats(sk);
          const pct = s.total ? Math.round(s.done / s.total * 100) : 0;
          const tc = Object.keys(data[sk]).length;
          const pc = pillClass(s.done, s.total, 0);
          return `<div class="list-item" onclick="goSection('${sk}')">
            <div><div class="li-label">Section ${sk.replace('S','')}</div><div class="li-meta">${tc} trackers · ${s.total} piles</div></div>
            <div class="li-right"><span class="pill ${pc}">${pct}%</span><i class="ti ti-chevron-right chevron"></i></div>
          </div>`;
        }).join('')}
      </div>`;
  }

  else if (state.view === 'section') {
    const sk = state.section;
    const trackers = Object.keys(data[sk]).sort((a,b) => parseInt(a.replace('T','')) - parseInt(b.replace('T','')));
    screen.innerHTML = `
      <p class="section-label">Trackers</p>
      <div class="list">
        ${trackers.map(tk => {
          const s = getTrackerStats(sk, tk);
          const pct = s.total ? Math.round(s.done / s.total * 100) : 0;
          const pc = pillClass(s.done, s.total, s.started);
          return `<div class="list-item" onclick="goTracker('${sk}','${tk}')">
            <div><div class="li-label">Tracker ${tk.replace('T','')}</div><div class="li-meta">${s.total} piles · ${s.done} complete</div></div>
            <div class="li-right"><span class="pill ${pc}">${pct}%</span><i class="ti ti-chevron-right chevron"></i></div>
          </div>`;
        }).join('')}
      </div>`;
  }

  else if (state.view === 'tracker') {
    const sk = state.section, tk = state.tracker;
    const piles = data[sk][tk], pileKeys = Object.keys(piles).sort();
    const stats = getTrackerStats(sk, tk);
    screen.innerHTML = `
      <div class="summary-bar">
        <div class="stat"><div class="stat-val">${stats.total}</div><div class="stat-lbl">Piles</div></div>
        <div class="stat"><div class="stat-val green">${stats.done}</div><div class="stat-lbl">Complete</div></div>
        <div class="stat"><div class="stat-val amber">${stats.started}</div><div class="stat-lbl">In progress</div></div>
      </div>
      <div class="actions-row">
        <button class="btn btn-primary btn-sm" onclick="markAll('complete')"><i class="ti ti-checks"></i> All complete</button>
        <button class="btn btn-sm" onclick="markAll(null)"><i class="ti ti-refresh"></i> Reset</button>
      </div>
      <p class="section-label">Piles · tap to change phase</p>
      <div class="pile-grid">
        ${pileKeys.map(p => {
          const ph = piles[p].phase;
          const label = ph ? (PHASES.find(x => x.id === ph)?.label || ph) : '—';
          return `<div class="pile-btn state-${ph||'none'} ${state.selectedPile===p?'selected':''}" onclick="selectPile('${p}')">
            <div class="p-id">${p}</div><div class="p-phase">${label}</div>
          </div>`;
        }).join('')}
      </div>
      <div id="phase-panel-container"></div>`;
    if (state.selectedPile) renderPhasePanel();
  }
}

function renderPhasePanel() {
  const el = document.getElementById('phase-panel-container');
  if (!el) return;
  const p = state.selectedPile, sk = state.section, tk = state.tracker;
  const cur = data[sk][tk][p]?.phase;
  const ts = data[sk][tk][p]?.ts;
  const who = data[sk][tk][p]?.name;
  el.innerHTML = `
    <div class="phase-panel">
      <div class="phase-panel-title">Pile <strong>${p}</strong> — select phase</div>
      <div class="phase-grid">
        ${PHASES.map(ph => `
          <div class="phase-opt ${cur===ph.id?'sel':''}" onclick="setPhase('${ph.id}')">
            <span class="phase-dot" style="background:${ph.color}"></span>${ph.label}
          </div>`).join('')}
      </div>
      <button class="btn" style="margin-top:0" onclick="state.selectedPile=null;render()">Close</button>
      ${ts ? `<div class="ts-label">${who||'?'} · ${new Date(ts).toLocaleString('en-AU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>` : ''}
    </div>`;
}

function selectDiscipline(id) {
  state.discipline = id;
  state.view = 'identity';
  render();
}
function confirmIdentity() {
  const n = document.getElementById('inp-name')?.value.trim();
  const e = document.getElementById('inp-equip')?.value.trim();
  if (!n) { alert('Please enter your name'); return; }
  state.name = n;
  state.equipment = e;
  state.view = 'home';
  save();
  render();
}
function changeIdentity() { state.view = 'discipline'; render(); }
function goSection(sk) { state.view = 'section'; state.section = sk; render(); }
function goTracker(sk, tk) { state.view = 'tracker'; state.section = sk; state.tracker = tk; state.selectedPile = null; render(); }
function goBack() {
  if (state.view === 'tracker') { state.view = 'section'; state.selectedPile = null; }
  else if (state.view === 'section') { state.view = 'home'; }
  else if (state.view === 'identity') { state.view = 'discipline'; }
  else if (state.view === 'home') { state.view = 'discipline'; }
  render();
}
function selectPile(p) { state.selectedPile = state.selectedPile === p ? null : p; render(); }
function setPhase(phase) {
  const sk = state.section, tk = state.tracker, p = state.selectedPile;
  data[sk][tk][p] = { phase, name: state.name, equipment: state.equipment, discipline: state.discipline, ts: Date.now() };
  save(); render();
}
function markAll(phase) {
  const sk = state.section, tk = state.tracker;
  Object.keys(data[sk][tk]).forEach(p => {
    data[sk][tk][p] = phase ? { phase, name: state.name, equipment: state.equipment, discipline: state.discipline, ts: Date.now() } : { phase: null, name: null, equipment: null, discipline: null, ts: null };
  });
  state.selectedPile = null; save(); render();
}

render();
</script>
